{% extends 'base.html' %}
{% block auth_content %}
<style>
  body { display:block !important; }
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
  .login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
  .login-header { text-align:center; margin-bottom:32px; }
  .login-header .icon { font-size:48px; margin-bottom:12px; }
  .login-header h1 { font-size:24px; font-weight:700; }
  .login-header p { color:var(--muted); font-size:14px; margin-top:4px; }
  .login-btn { width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px; }
</style>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-header">
      <div class="icon">📚</div>
      <h1>Library MS</h1>
      <p>Sign in to manage your library</p>
    </div>
    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-error" style="margin-bottom:16px;"><i class="fas fa-times-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary login-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
