{% extends 'base.html' %}
{% block title %}{{ action }} Member - LibraryMS{% endblock %}
{% block page_title %}{{ action }} Member{% endblock %}
{% block content %}
<div style="max-width:540px;">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" value="{{ member.name|default:'' }}" placeholder="e.g. Rahul Sharma" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" value="{{ member.email|default:'' }}" placeholder="rahul@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <input type="text" name="phone" value="{{ member.phone|default:'' }}" placeholder="9876543210" required>
      </div>
      {% if action == 'Add' %}
      <p style="color:var(--muted); font-size:13px; margin-bottom:20px;"><i class="fas fa-info-circle"></i> Member ID will be auto-generated.</p>
      {% endif %}
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> {{ action }} Member</button>
        <a href="{% url 'member_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
